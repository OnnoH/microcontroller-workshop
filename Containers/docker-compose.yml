services:
  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto
    volumes:
      - ./data/mosquitto/config:/mosquitto/config
      - ./data/mosquitto/data:/mosquitto/data
      - ./data/mosquitto/log:/mosquitto/log
    ports:
      - 1883:1883
      - 9001:9001
    stdin_open: true
    tty: true

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./data/influxdb:/var/lib/influxdb2
    restart: always
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=myorg
      - DOCKER_INFLUXDB_INIT_BUCKET=fishesp32
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=mytoken

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    volumes:
      - ./data/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - ./data/telegraf/telegraf.d/:/etc/telegraf/telegraf.d/
    restart: always
    depends_on:
      - influxdb
    # entrypoint : this ensure Mosquitto server is up and ready to accept a new connection
    entrypoint: >
      bash -c '
        until timeout 1 bash -c "</dev/tcp/mosquitto/1883" 2>/dev/null; do
          echo "Waiting for Mosquitto...";
          sleep 2;
        done;
        exec telegraf'

  grafana:
    image: grafana/grafana-oss
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SERVER_HTTP_ADDR=0.0.0.0
    volumes:
      - ./data/grafana:/var/lib/grafana
    restart: always
    depends_on:
      - influxdb

  mkdocs:
    image: mkdocs
    container_name: mkdocs
    hostname: mkdocs
    command: ["serve", "-a", "0.0.0.0:8000"]
    ports:
      - "80:8000"
    volumes:
      - ./data/mkdocs:/usr/src/mkdocs/build
    stdin_open: true
    tty: true
